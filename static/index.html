<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Il mio sito</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<header>
    <h1>Benvenuto nel mio sito</h1>
</header>

<main>

    <section>
        <h2>Chi sono</h2>
        <p>Ciao! mi chiamo Gabriele Zarka e sono un appassionato di informatica</p>
    </section>

    <hr>

    <!-- ORARIO -->
    <div class="container">
        <h2>Gestione Orario</h2>
        <p id="orario">Clicca il tasto per conoscere l'ora del server</p>
        <button id="btn-ora">Aggiorna Ora</button>
    </div>

    <hr>

    <!-- SALUTO -->
    <div class="card">
        <h2>Saluto Personalizzato</h2>
        <input type="text" id="input-nome" placeholder="Scrivi il tuo nome...">
        <button id="btn-saluto">Invia al Server</button>
        <h3 id="risposta-saluto"></h3>
    </div>

    <hr>

    <!-- SOMMA NUMERI 🔥 -->
    <div class="card">
        <h2>Somma di due numeri</h2>

        <input type="number" id="num1" placeholder="Primo numero">
        <input type="number" id="num2" placeholder="Secondo numero">

        <button id="btn-somma">Somma</button>

        <h3 id="risultato-somma"></h3>
    </div>

</main>

<script src="/static/script.js"></script>

</body>
</html>
